seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 2000
empirical_normalization: null
obs_groups:
  policy:
  - policy
  critic:
  - policy
clip_actions: null
save_interval: 100
experiment_name: k1_kick_isaaclab
run_name: kick_fixed_ball_v1
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: /home/team2/IsaacLab/logs/rsl_rl/k1_kick_isaaclab/2026-05-09_19-55-49_kick_fixed_ball_v1/model_1999.pt
class_name: OnPolicyRunner
policy:
  class_name: ActorCritic
  init_noise_std: 0.1
  noise_std_type: scalar
  state_dependent_std: false
  actor_obs_normalization: true
  critic_obs_normalization: true
  actor_hidden_dims:
  - 256
  - 128
  - 128
  critic_hidden_dims:
  - 256
  - 256
  - 128
  activation: elu
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 3.0e-05
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.003
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  rnd_cfg: null
  symmetry_cfg: null
