seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 2000
empirical_normalization: null
obs_groups:
  policy:
  - policy
  critic:
  - policy
clip_actions: null
save_interval: 50
experiment_name: k1_kick_team2
run_name: ppo_singlestage_fromstage2
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: /home/team2/team2_project/booster_train/logs/rsl_rl/k1_kick_team2/2026-05-09_01-12-40_ppo_stage2_fromstage1/model_1499.pt
class_name: OnPolicyRunner
policy:
  class_name: ActorCritic
  init_noise_std: 0.3
  noise_std_type: scalar
  state_dependent_std: false
  actor_obs_normalization: false
  critic_obs_normalization: false
  actor_hidden_dims:
  - 256
  - 128
  - 128
  critic_hidden_dims:
  - 256
  - 128
  - 128
  activation: elu
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.0005
  schedule: adaptive
  gamma: 0.995
  lam: 0.95
  entropy_coef: 0.01
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  rnd_cfg: null
  symmetry_cfg: null
